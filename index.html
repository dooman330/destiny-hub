<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Destiny Hub</title>

<style>
body{
font-family:sans-serif;
padding:20px;
background:#f5f5f5;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
}
</style>
</head>

<body>

<h1>🔮 Destiny Hub</h1>

<div class="box">
<h2>출생정보</h2>

<input id="name" placeholder="이름">
<input id="country" placeholder="국가">
<input id="city" placeholder="도시">

<button onclick="savePerson()">저장</button>
</div>

<div class="box">
<h2>저장된 인물</h2>
<div id="list"></div>
</div>

<script>

function savePerson(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

people.push({
name:document.getElementById('name').value,
country:document.getElementById('country').value,
city:document.getElementById('city').value
});

localStorage.setItem(
'people',
JSON.stringify(people)
);

render();

}

function render(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

document.getElementById('list').innerHTML=
people.map(p=>
`<p><b>${p.name}</b> - ${p.city}, ${p.country}</p>`
).join('');

}

render();

</script>

</body>
</html>
