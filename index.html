<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Destiny Hub</title>

<style>
body{
font-family:sans-serif;
padding:20px;
background:#f5f5f5;
}

.box{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:8px;
}

.person{
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

.person:hover{
background:#f8f8f8;
}

#report{
display:none;
}

.report-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>🔮 Destiny Hub</h1>

<div class="box">

<h2>출생정보</h2>

<input id="name" placeholder="이름">

<select id="gender">
<option value="여성">여성</option>
<option value="남성">남성</option>
</select>

<input id="birthdate" type="date">

<input id="birthtime" type="time">

<input id="country" placeholder="국가">

<input id="city" placeholder="도시">

<button onclick="savePerson()">저장</button>

<button onclick="deleteAll()">전체 삭제</button>

</div>

<div class="box">

<h2>저장된 인물</h2>

<div id="list"></div>

</div>

<div class="box" id="report">

<div id="reportContent"></div>

</div>

<script>

function savePerson(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

people.push({
name:document.getElementById('name').value,
gender:document.getElementById('gender').value,
birthdate:document.getElementById('birthdate').value,
birthtime:document.getElementById('birthtime').value,
country:document.getElementById('country').value,
city:document.getElementById('city').value
});

localStorage.setItem(
'people',
JSON.stringify(people)
);

render();

}

function deleteAll(){

if(confirm('모든 인물을 삭제할까요?')){

localStorage.clear();

render();

document.getElementById('report').style.display='none';

}

}

function showReport(index){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

let p=people[index];

document.getElementById('report').style.display='block';

document.getElementById('reportContent').innerHTML=`

<div class="report-title">
${p.name}
</div>

<p>
성별: ${p.gender}
</p>

<p>
출생일: ${p.birthdate}
</p>

<p>
출생시간: ${p.birthtime}
</p>

<p>
출생지: ${p.city}, ${p.country}
</p>

<hr>

<h3>🧧 사주</h3>

<p>
준비중
</p>

<h3>⭐ 서양 점성술</h3>

<p>
준비중
</p>

<h3>🪷 인도 점성술</h3>

<p>
준비중
</p>

`;

}

function render(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

document.getElementById('list').innerHTML=
people.map((p,i)=>`
<div class="person"
onclick="showReport(${i})">

<b>${p.name}</b><br>

${p.city}, ${p.country}

</div>
`).join('');

}

render();

</script>

</body>
</html>
