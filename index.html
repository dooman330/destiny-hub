<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Destiny Hub</title>

<style>
body{
font-family:sans-serif;
padding:20px;
background:#f5f5f5;
}

.box{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:8px;
}

.person{
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

.person:hover{
background:#f8f8f8;
}

#report{
display:none;
}

.report-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>🔮 Destiny Hub</h1>

<div class="box">

<h2>출생정보</h2>

<input id="name" placeholder="이름">

<select id="gender">
<option value="여성">여성</option>
<option value="남성">남성</option>
</select>

<input id="birthdate" type="date">

<input id="birthtime" type="time">

<input id="country" placeholder="국가">

<input id="city" placeholder="도시">

<button onclick="savePerson()">저장</button>
<button onclick="deleteAll()">전체 삭제</button>

</div>

<div class="box">

<h2>저장된 인물</h2>

<div id="list"></div>

</div>

<div class="box" id="report">
<div id="reportContent"></div>
</div>

<script>

window.currentIndex=null;

/* =========================
   저장 / 삭제
========================= */

function savePerson(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

people.push({
name:name.value,
gender:gender.value,
birthdate:birthdate.value,
birthtime:birthtime.value,
country:country.value,
city:city.value
});

localStorage.setItem('people',JSON.stringify(people));
render();
}

function deleteAll(){

if(confirm('모든 인물을 삭제할까요?')){

localStorage.clear();
render();
document.getElementById('report').style.display='none';

}
}

/* =========================
   개별 삭제
========================= */

function deletePerson(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

people.splice(window.currentIndex,1);

localStorage.setItem('people',JSON.stringify(people));

document.getElementById('report').style.display='none';
render();
}

/* =========================
   수정 불러오기
========================= */

function editPerson(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

let p=people[window.currentIndex];

name.value=p.name;
gender.value=p.gender;
birthdate.value=p.birthdate;
birthtime.value=p.birthtime;
country.value=p.country;
city.value=p.city;

window.scrollTo({top:0,behavior:'smooth'});
}

/* =========================
   리포트
========================= */

function showReport(index){

window.currentIndex=index;

let people=
JSON.parse(localStorage.getItem('people')||'[]');

let p=people[index];

document.getElementById('report').style.display='block';

document.getElementById('reportContent').innerHTML=`

<div class="report-title">${p.name}</div>

<p><b>성별:</b> ${p.gender}</p>
<p><b>출생일:</b> ${p.birthdate}</p>
<p><b>출생시간:</b> ${p.birthtime}</p>
<p><b>출생지:</b> ${p.city}, ${p.country}</p>

<hr>

<h3>🧧 사주</h3>
<p>${getSaju(p.birthdate)}</p>

<h3>⭐ 서양 점성술</h3>
<p>${getWesternAstro(p.birthdate, p.birthtime)}</p>

<hr>

<button onclick="editPerson()">수정</button>
<button onclick="deletePerson()">이 인물 삭제</button>

`;

}

/* =========================
   리스트
========================= */

function render(){

let people=
JSON.parse(localStorage.getItem('people')||'[]');

document.getElementById('list').innerHTML=
people.map((p,i)=>`
<div class="person" onclick="showReport(${i})">
<b>${p.name}</b><br>
${p.city}, ${p.country}
</div>
`).join('');
}

render();

/* =========================
   🧧 사주 (간단)
========================= */

function getSaju(dateStr){

const stems=["갑","을","병","정","무","기","경","신","임","계"];
const branches=["자","축","인","묘","진","사","오","미","신","유","술","해"];

let date=new Date(dateStr);

let year=date.getFullYear();
let month=date.getMonth()+1;
let day=date.getDate();

let ys=stems[(year-4)%10];
let yb=branches[(year-4)%12];

let ms=stems[(year*12+month)%10];
let mb=branches[(month+1)%12];

let base=Math.floor(date.getTime()/86400000);

let ds=stems[base%10];
let db=branches[base%12];

return `
${ys}${yb}년<br>
${ms}${mb}월<br>
${ds}${db}일
`;
}

/* =========================
   ⭐ 서양 점성술 (임시)
========================= */

function getWesternAstro(dateStr,timeStr){

let date=new Date(dateStr+"T"+(timeStr||"12:00"));

const signs=[
"양자리","황소자리","쌍둥이자리","게자리",
"사자자리","처녀자리","천칭자리","전갈자리",
"사수자리","염소자리","물병자리","물고기자리"
];

let month=date.getMonth()+1;
let day=date.getDate();
let hour=date.getHours();

let sun=signs[Math.floor((month*30+day)/30)%12];
let moon=signs[(day+hour)%12];
let asc=signs[(hour+37)%12];

return `
☀️ 태양: ${sun}<br>
🌙 달: ${moon}<br>
⬆️ 상승궁: ${asc}
`;
}

</script>

</body>
</html>
